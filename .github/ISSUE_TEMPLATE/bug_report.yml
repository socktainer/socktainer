name: Bug Report
description: Report a bug in socktainer.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: |
        **Actual behavior:** ...
        **Expected behavior:** ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `socktainer`
        2. Run `docker ...`
        3. ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: macOS version, socktainer version, Docker CLI version, and any other relevant details.
      placeholder: |
        - macOS: 26.0 (Tahoe)
        - socktainer: v0.x.x
        - Docker CLI: 28.x
        - Apple Container: x.x.x
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output, error messages, or stack traces.
      render: shell
    validations:
      required: false
